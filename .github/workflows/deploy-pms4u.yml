name: Deploy PMS4U to ALL-INKL FTP

on:
  push:
    branches:
      - main
    paths:
      - "pms4u/**"
      - ".github/workflows/deploy-pms4u.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pms4u

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pms4u/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Next.js App
        run: npm run build

      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /bpbsolutionsltd.com/
          local-dir: ./pms4u/out/
