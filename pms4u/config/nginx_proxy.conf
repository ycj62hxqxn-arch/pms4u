worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # -------------------------------------------------------------
    # 1. Operational Intake Domain (CARSHUNTER Flask)
    # -------------------------------------------------------------
    # Redirect old local domain to the new info domain
    server {
        listen 80;
        server_name carshunter.gtcs4u.local;
        return 301 http://gtcs4u.info$request_uri;
    }

    server {
        listen 80;
        server_name gtcs4u.info carshunter.gtcs4u.info;

        location / {
            proxy_pass http://127.0.0.1:5001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Preserve Correlation ID if generated at Edge (API Gateway)
            proxy_set_header X-Correlation-ID $http_x_correlation_id;
        }
    }

    # -------------------------------------------------------------
    # 2. Constitutional Execution Runtime (Governance FastAPI)
    # -------------------------------------------------------------
    server {
        listen 80;
        server_name governance.gtcs4u.local;

        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket support for /ws/trace/
        location /ws/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }

    # -------------------------------------------------------------
    # 3. Execution Observatory (Next.js Tracing UI & BPB Authority)
    # -------------------------------------------------------------
    server {
        listen 80;
        server_name trace.gtcs4u.local pms.bpbsolutionsltd.com;

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}
