<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#0b0b0f" />
  <text x="140" y="260" fill="#d1b15c" font-size="64" font-family="Segoe UI, Arial" font-weight="700">السؤال الحقيقي</text>
  <text x="140" y="360" fill="#f5f5f7" font-size="38" font-family="Segoe UI, Arial">ماذا يحدث عندما:</text>
  <text x="160" y="440" fill="#b7b7c0" font-size="34" font-family="Segoe UI, Arial">• تختلف النماذج؟</text>
  <text x="160" y="500" fill="#b7b7c0" font-size="34" font-family="Segoe UI, Arial">• تتعارض النتائج؟</text>
  <text x="160" y="560" fill="#b7b7c0" font-size="34" font-family="Segoe UI, Arial">• يتغير السياق؟</text>
</svg>
